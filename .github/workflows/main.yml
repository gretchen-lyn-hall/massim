name: Build and Publish Wheels

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # matrix setup for Windows, Ubuntu Linux, and macOS
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up QEMU (Required for Linux ARM64 cross-compilation)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Configuration for compilation targets
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_WINDOWS: "AMD64 ARM64"
          CIBW_ARCHS_MACOS: "x86_64 arm64 universal2"
          
          # Optional: Run tests inside the wheels before finalizing
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests"

      - name: Upload artifact wheels
        uses: actions/abstract-artifacts@v4 # Note: Use upload-artifact if target version differs
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload artifact sdist
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish_to_pypi:
    name: Publish packages to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Securely deploy to PyPI only when a GitHub Release is published
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://test.pypi.org
    permissions:
      id-token: write  # Mandatory for Trusted Publishing (OIDC)
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
