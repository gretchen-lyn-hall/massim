name: Build and Publish Wheels

on:
  push:
    branches: [ main, master ]
# To trigger a release: use `gh release create`
  release:
    types: [ published ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # matrix setup for Windows, Ubuntu Linux, and macOS
        os: [ubuntu-latest, ubuntu-24.04-arm] #[macos-26] #[ubuntu-latest, windows-latest, macos-latest]
        

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: jrl-umi3218/github-actions/install-dependencies@master
        with:
          compiler: clang
          build-type: ${{ matrix.build-type }}
          #ubuntu: |
          #  apt: libeigen3-dev
          macos: |
            brew: eigen libomp
          windows: |
            github:
              - path: eigenteam/eigen-git-mirror
                ref: 3.3.7

      # Used to host cibuildwheel
      - uses: actions/setup-python@v6

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
               # to supply options, put them in 'env', like:
        env:
          # Configuration for compilation targets
          # Unfortunately, igraph doesn't build on free threaded, so
          # exclude that.
          #CIBW_BUILD: "cp3??-*"
          # CIBW_ARCHS_LINUX: "x86_64 aarch64"
          #CIBW_ARCHS_WINDOWS: "AMD64 ARM64"
          CIBW_BEFORE_ALL_LINUX: "yum install -y eigen3-devel"
          CIBW_ARCHS_MACOS: "arm64"
          # Optional: Run tests inside the wheels before finalizing
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests"
          # Disable repair for now
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload artifact sdist
        uses: actions/upload-artifact@v7
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

# Note - this can be tricky to set up. Note that you have to make sure
# EVERYTHING in the trusted publisher is identical, including workflow
# name. You don't get much of a helpful error if there's a typo (.yaml instead
# of .yml)

  publish_to_pypi:
    name: Publish packages to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Securely deploy to PyPI only when a GitHub Release is published
    # (gh release create)
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/massim
    permissions:
      id-token: write  # Mandatory for Trusted Publishing (OIDC)
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
